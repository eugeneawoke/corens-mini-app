<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5e5ce6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-chip {
            background-color: #5e5ce6;
            color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-x-hidden shadow-xl bg-background-light dark:bg-background-dark">
<!-- TopAppBar -->
<header class="flex flex-col w-full px-4 pt-4">
<div class="flex items-center justify-between py-2">
<button aria-label="Go back" class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Ключи доверия</h1>
</div>
<div class="mt-2 text-center">
<p class="text-primary text-sm font-medium">Выбрано 3 из 5</p>
</div>
</header>
<!-- Navigation Tabs -->
<nav class="mt-4 px-4 border-b border-primary/10">
<div class="flex gap-8">
<a class="flex flex-col items-center justify-center border-b-2 border-primary pb-3 pt-2" href="#">
<span class="text-slate-900 dark:text-slate-100 text-sm font-bold">Ценности</span>
</a>
<a class="flex flex-col items-center justify-center border-b-2 border-transparent pb-3 pt-2" href="#">
<span class="text-slate-500 dark:text-slate-400 text-sm font-bold">Стиль жизни</span>
</a>
</div>
</nav>
<!-- Chips Grid Section -->
<main class="flex-1 overflow-y-auto p-4">
<div class="flex flex-wrap gap-3">
<!-- Selected Chips -->
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl active-chip px-5 shadow-sm">
<span class="text-sm font-medium">Семья</span>
<span class="material-symbols-outlined text-sm">check</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl active-chip px-5 shadow-sm">
<span class="text-sm font-medium">Здоровье</span>
<span class="material-symbols-outlined text-sm">check</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl active-chip px-5 shadow-sm">
<span class="text-sm font-medium">Честность</span>
<span class="material-symbols-outlined text-sm">check</span>
</button>
<!-- Unselected Chips -->
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Карьера</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Саморазвитие</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Свобода</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Творчество</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Стабильность</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Уважение</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Безопасность</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Доброта</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Обучение</span>
</button>
<button class="flex h-10 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/10 dark:bg-primary/20 text-slate-900 dark:text-slate-100 px-5 border border-primary/5">
<span class="text-sm font-medium">Дружба</span>
</button>
</div>
<!-- Optional secondary category info -->
<div class="mt-8 flex flex-col gap-2">
<h3 class="text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-wider px-1">Подсказка</h3>
<div class="p-4 rounded-xl bg-primary/5 border border-primary/10">
<p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                        Выберите ценности, которые наиболее важны для вас в отношениях. Это поможет нам найти людей с похожими взглядами.
                    </p>
</div>
</div>
</main>
<!-- Fixed Bottom Button -->
<footer class="p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<button class="w-full flex cursor-pointer items-center justify-center rounded-xl h-14 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all">
<span>Сохранить</span>
</button>
<div class="h-4"></div> <!-- Padding for safe area / navigation bar -->
</footer>
</div>
</body></html>
