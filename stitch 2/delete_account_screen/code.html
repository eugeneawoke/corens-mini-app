<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5e5ce6",
                        "danger": "#ef4444",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden max-w-md mx-auto shadow-xl">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1">Удаление аккаунта</h2>
</div>
<!-- Content Container -->
<div class="p-4 space-y-6">
<!-- Warning Block -->
<div class="flex flex-col items-stretch justify-start rounded-xl border-2 border-danger/20 bg-danger/5 p-5 shadow-sm">
<div class="flex items-center gap-3 mb-3">
<span class="material-symbols-outlined text-danger text-3xl">warning</span>
<p class="text-danger text-xl font-bold leading-tight tracking-[-0.015em]">Внимание</p>
</div>
<div class="flex flex-col gap-1">
<p class="text-slate-700 dark:text-slate-300 text-base font-medium leading-relaxed">
                        Это действие нельзя отменить. Все ваши связи, ключи и настройки будут безвозвратно удалены.
                    </p>
</div>
</div>
<!-- Illustration/Visual (Optional but keeps consistency with component list style) -->
<div class="w-full h-48 bg-gradient-to-br from-primary/10 to-danger/10 rounded-xl flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-20" data-alt="Abstract subtle pattern background" style="background-image: radial-gradient(circle at 2px 2px, #5e5ce6 1px, transparent 0); background-size: 24px 24px;"></div>
<span class="material-symbols-outlined text-danger/40 text-7xl">delete_forever</span>
</div>
<!-- Confirmation Input -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-slate-500 dark:text-slate-400 px-1">
                    Подтвердите действие
                </label>
<div class="flex flex-wrap items-end gap-4">
<label class="flex flex-col min-w-40 flex-1">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-danger/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder='Введите "удалить" для подтверждения' type="text"/>
</label>
</div>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto p-4 pt-8">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-danger text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-danger/90 active:scale-[0.98] transition-all shadow-lg shadow-danger/20">
<span class="truncate">Удалить навсегда</span>
</button>
<button class="mt-3 flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-transparent text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
<span class="truncate">Отмена</span>
</button>
</div>
<div class="h-5 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
