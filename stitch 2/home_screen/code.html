<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5e5ce6",
                        "background-light": "#f9f9f8",
                        "background-dark": "#121220",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "satoshi": ["Satoshi", "Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-satoshi {
            font-family: 'Inter', sans-serif; /* Fallback as Satoshi is local usually, using Inter for consistency */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Bar -->
<header class="flex items-center justify-between px-6 py-4 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">hub</span>
</div>
<h1 class="text-xl font-bold tracking-tight font-display">Corens</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">person</span>
</button>
</header>
<!-- Main Content / Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-6">
<div class="w-full max-w-sm flex flex-col items-center text-center">
<!-- Soft Cloud Motif -->
<div class="relative w-64 h-64 mb-8 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl opacity-60"></div>
<div class="relative w-48 h-48 bg-gradient-to-br from-primary/20 to-primary/5 rounded-full flex items-center justify-center border border-primary/10">
<div class="w-32 h-32 bg-white/40 dark:bg-white/5 backdrop-blur-sm rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-5xl">sensors</span>
</div>
</div>
</div>
<!-- Text Content -->
<h3 class="text-2xl font-bold mb-3 font-display text-slate-900 dark:text-slate-100">
                Сейчас у вас нет активных связей
            </h3>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                Ожидание совпадений...
            </p>
</div>
</main>
<!-- Bottom Action Bar & Navigation -->
<footer class="w-full max-w-md mx-auto px-6 pb-8 pt-4 space-y-6">
<!-- Action Button -->
<div class="flex flex-col gap-3">
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all active:scale-[0.98]">
                Включить Beacon
            </button>
</div>
<!-- Navigation Bar -->
<nav class="flex justify-between items-center bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 p-2 rounded-2xl backdrop-blur-md">
<a class="flex flex-col items-center gap-1 flex-1 py-2 text-primary" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">link</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Connections</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">radar</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Beacon</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 py-2 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
</a>
</nav>
</footer>
</body></html>
